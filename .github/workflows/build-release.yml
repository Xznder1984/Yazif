name: Build & Release Python App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python build.py

      - name: Create portable zip
        run: Compress-Archive -Path dist\Yazif\* -DestinationPath release\Yazif-Portable.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yazif-windows
          path: |
            dist/Yazif/Yazif.exe
            release/Yazif-Portable.zip
          if-no-files-found: error

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Get version
        id: version
        run: echo "version=$(python -c "import re; print(re.search(r\"version='(.+?)'\", open('main.py').read()).group(1))")" >> "$GITHUB_OUTPUT"

      - name: Delete existing release
        run: gh release delete "v${{ steps.version.outputs.version }}" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Yazif v${{ steps.version.outputs.version }}
          files: |
            artifacts/dist/Yazif/Yazif.exe
            artifacts/release/Yazif-Portable.zip
          draft: false
          prerelease: false
          generate_release_notes: true
