name: Build & Release Python App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build executable
        run: python build.py

      - name: Create portable zip
        run: Compress-Archive -Path dist\Yazif.exe -DestinationPath release\Yazif-Portable.zip

      - name: Build NSIS installer
        run: makensis installer.nsi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yazif-windows
          path: |
            dist/Yazif.exe
            release/Yazif-Portable.zip
            Yazif-Setup.exe
          if-no-files-found: error

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: Yazif v1.0.0
          files: |
            artifacts/Yazif.exe
            artifacts/Yazif-Portable.zip
            artifacts/Yazif-Setup.exe
          draft: false
          prerelease: false
          generate_release_notes: true
